{% extends "base.html" %}

{% block title %}注册账户 - {{ project_name }} {{ project_version }}{% endblock %}

{% block content %}
<div class="form-page">
    <div class="card form-card shadow-sm">
        <div class="card-body">
            <h2 class="mb-4 text-center">注册账户</h2>

            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">邮箱</label>
                    <input type="email" name="email" class="form-control" placeholder="请输入邮箱" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" placeholder="至少 6 位" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">确认密码</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="再次输入密码" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">注册</button>
            </form>

            <p class="text-center mt-3 mb-0">
                已有账户？
                <a href="{{ url_for('login') }}">去登录</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
