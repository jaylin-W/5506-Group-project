{% extends "base.html" %}

{% block title %}Register - {{ project_name }} {{ project_version }}{% endblock %}

{% block content %}
<div class="form-page">
    <div class="card form-card shadow-sm">
        <div class="card-body">
            <h2 class="mb-4 text-center">Register</h2>

            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter email" autocomplete="email" autocapitalize="none" autocorrect="off" spellcheck="false" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="At least 6 characters" autocomplete="new-password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" autocomplete="new-password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Pill Box Unlock Password</label>
                    <input type="password" name="unlock_password" class="form-control" placeholder="At least 4 characters" autocomplete="new-password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Pill Box Unlock Password</label>
                    <input type="password" name="confirm_unlock_password" class="form-control" placeholder="Confirm pill box unlock password" autocomplete="new-password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Security Question</label>
                    <select name="security_question" class="form-select" required>
                        <option value="">Please select</option>
                        {% for key, label in security_questions %}
                            <option value="{{ key }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Security Answer</label>
                    <input type="text" name="security_answer" class="form-control" placeholder="Enter your answer" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>

            <p class="text-center mt-3 mb-0">
                Already have an account?
                <a href="{{ url_for('login') }}">Log in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
